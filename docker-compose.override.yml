---
# =============================================================================
# docker-compose.override.yml — development-only overrides
#
# Loaded automatically by `docker compose up` on top of docker-compose.yml.
# Provides hot-reload for the app container during local development.
# =============================================================================

services:
  app:
    command:
      - uvicorn
      - lore_eligibility.bootstrapper.main:create_app
      - --factory
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
    volumes:
      # Mount source for hot-reload. The Dockerfile already copies src/ into
      # the image; this overlay supersedes it during dev only.
      - ./src:/app/src:ro
