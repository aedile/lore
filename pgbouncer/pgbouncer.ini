; pgbouncer.ini — PgBouncer connection pooler configuration for lore-eligibility
;
; This file is used when running PgBouncer standalone (outside Docker Compose).
; In the Docker Compose setup, configuration is passed via environment variables
; to the edoburu/pgbouncer image (see docker-compose.yml pgbouncer service).
;
; For production deployments, replace the plaintext password in userlist.txt
; with a SCRAM-SHA-256 hash extracted from pg_shadow (see userlist.txt.example).
;
; Reference: https://www.pgbouncer.org/config.html

[databases]
; Route all connections for the lore_eligibility database to the postgres service.
lore_eligibility = host=postgres port=5432 dbname=lore_eligibility

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432

; SCRAM-SHA-256 for production (md5 is deprecated in PG14+)
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; Pool mode: transaction — server connection held only for duration of
; transaction. Most efficient mode for high-concurrency OLTP workloads.
pool_mode = transaction

; Connection limits
max_client_conn = 100
default_pool_size = 10

; Server-side connection lifecycle
server_idle_timeout = 600
server_lifetime = 3600
client_idle_timeout = 0

; Logging — write to stdout so Docker captures logs via json-file driver
logfile =
pidfile =

; Admin interface — bind to localhost only within the container
admin_users = postgres
stats_users = postgres
