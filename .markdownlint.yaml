# .markdownlint.yaml — Markdownlint configuration for lore-eligibility
#
# The project uses a documentation style with:
# - Tables that exceed 80 characters (content-driven width)
# - Table separator rows using the `|---|` compact style
# - Code blocks with language specifiers
#
# Rules adjusted to match the project's established documentation conventions.

# MD013 — Line length
# Disable in tables and code blocks; long table rows are unavoidable for
# readable documentation. Prose lines are encouraged to stay under 120 chars.
MD013:
  line_length: 120
  tables: false
  code_blocks: false

# MD033 — Inline HTML
# Disabled: the project does not use inline HTML in docs.
MD033: false

# MD041 — First line in file should be a top-level heading
# Enabled (default): all docs must start with a # heading.
MD041: true

# MD060 — Table column style
# Disabled: the project uses compact `|---|` separator rows throughout
# all existing documentation (ADRs, BACKLOG, etc.).
MD060: false
