# alembic.ini — Alembic migration configuration for lore-eligibility.
#
# DUAL-DRIVER NOTE:
# This file uses psycopg2 (synchronous driver) for migrations.
# The application runtime uses asyncpg (asynchronous driver) via database.py.
# Alembic does not support fully async offline mode, hence the split.
#
# DATABASE_URL is read from the environment at migration time.
# No credentials are stored in this file.
#
# Set this environment variable before running migrations:
#   export DATABASE_URL="postgresql+psycopg2://<user>@<host>:5432/<dbname>"
#
# CONSTITUTION Priority 0: Security — credentials via env vars only.

[alembic]
# Path to the migration scripts directory
script_location = alembic

# Template for migration revision filenames
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for revision timestamps
timezone = UTC

# Truncate slug to avoid excessively long filenames
truncate_slug_length = 40

# Database URL sourced exclusively from the DATABASE_URL environment variable.
sqlalchemy.url = %(DATABASE_URL)s

# ---------------------------------------------------------------------------
# Logging configuration
# ---------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
