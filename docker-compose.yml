---
# =============================================================================
# docker-compose.yml — base services for lore-eligibility local development
#
# Services:
#   postgres   — PostgreSQL 16 primary data store
#   pgbouncer  — PgBouncer connection pooler (transaction mode)
#   app        — lore-eligibility application (built from Dockerfile)
#
# Observability stack (prometheus / grafana / alertmanager) is intentionally
# absent at this stage; it can be added when the brief's "operational
# observability across the pipeline" requirement is implemented in a later
# phase.
#
# Security hardening:
#   - All external images SHA-256 pinned (supply chain integrity)
#   - Log rotation: json-file driver, max-size 50m, max-file 5
#   - Resource limits on all services
#   - Named volumes only — no anonymous volumes (data accountability)
#   - Internal bridge network isolating inter-service traffic
#
# Provisioning before first `docker compose up`:
#   mkdir -p secrets
#   openssl rand -hex 32 > secrets/postgres_password.txt
#   chmod 600 secrets/postgres_password.txt
#   cp pgbouncer/userlist.txt.example pgbouncer/userlist.txt
#   # Edit pgbouncer/userlist.txt with the SCRAM-SHA-256 hash for postgres.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # postgres — PostgreSQL 16 primary relational store
  #
  # Security notes:
  #   - Password injected via Docker secret (not baked into image).
  #   - Named volume lore-postgres-data MUST reside on an encrypted host
  #     volume in production deployments (LUKS or macOS FileVault).
  #   - No external port exposure: only app and pgbouncer reach postgres
  #     via the internal bridge network.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine@sha256:20edbde7749f822887a1a022ad526fde0a47d6b2be9a8364433605cf65099416
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: lore_eligibility
    volumes:
      - lore-postgres-data:/var/lib/postgresql/data
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 1g
    cpus: "1.0"
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # pgbouncer — PgBouncer connection pooler (transaction mode)
  # ---------------------------------------------------------------------------
  pgbouncer:
    image: edoburu/pgbouncer:v1.23.1-p3@sha256:377dec3c0e4a66a1077ec043e16a26ed5702a6d954011a7983a1457c2e070b1d
    environment:
      DB_HOST: postgres
      DATABASES_PORT: "5432"
      DATABASES_USER: postgres
      DATABASES_DBNAME: lore_eligibility
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: "100"
      PGBOUNCER_DEFAULT_POOL_SIZE: "10"
      PGBOUNCER_AUTH_TYPE: scram-sha-256
      PGBOUNCER_AUTH_FILE: /etc/pgbouncer/userlist.txt
    volumes:
      # Operators MUST copy userlist.txt.example to userlist.txt and populate
      # it with a SCRAM-SHA-256 hash before deploying pgbouncer.
      - ./pgbouncer/userlist.txt.example:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 128m
    cpus: "0.25"
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # app — lore-eligibility application
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    stop_grace_period: 60s
    mem_limit: 2g
    cpus: "2.0"
    ports:
      - "8000:8000"
    networks:
      - internal
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    restart: unless-stopped

# =============================================================================
# Named volumes
# =============================================================================
volumes:
  # lore-postgres-data: persists PostgreSQL WAL and data files.
  # For production deployments the host path MUST reside on an encrypted
  # volume (LUKS on Linux, FileVault on macOS).
  lore-postgres-data:

# =============================================================================
# Networks
# =============================================================================
networks:
  internal:
    driver: bridge

# =============================================================================
# Docker secrets skeleton
#
# Secret files are NEVER committed to git (see .gitignore: secrets/).
# Before running `docker compose up` on a fresh host:
#   mkdir -p secrets
#   openssl rand -hex 32 > secrets/postgres_password.txt
#   chmod 600 secrets/postgres_password.txt
# =============================================================================
secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
